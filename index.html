<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RELAY — World Broadcast Tuner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>

<!-- PWA Specs -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFFFFF" id="themeMeta">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RELAY">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="shortcut icon" href="icons/favicon.ico">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<style>
  /* ---------- 4. CSS Theme System (Defaulting to crisp B&W) ---------- */
  :root {
    --bg: #FFFFFF;
    --surface: #F9FBFD;
    --surface-2: #E8EDF2;
    --line: #000000;
    --text: #000000;
    --muted: #5A6573;
    --signal: #FF5A1F;
    --tuned: #0D9488;
    --danger: #E11D48;
    --radius: 6px;
    --focus-ring: #2563EB;
  }

  body.dark-theme {
    --bg: #000000;
    --surface: #101419;
    --surface-2: #1B232E;
    --line: #2D394A;
    --text: #E8EDF2;
    --muted: #8E9CAE;
    --signal: #FF6B35;
    --tuned: #2DD4BF;
    --danger: #FB7185;
    --focus-ring: #38BDF8;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    transition: background-color 0.2s, color 0.2s, border-color 0.2s;
  }

  .mono { font-family: 'IBM Plex Mono', monospace; }
  button { font-family: inherit; }

  /* ---------- 3. Modern Responsive App Shell ---------- */
  #app {
    max-width: 1200px; /* Expands nicely on Desktop & TV displays */
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    padding: 0 16px;
  }

  header {
    padding: 24px 0 16px;
    border-bottom: 2px solid var(--line);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 5;
    transition: background-color 0.2s;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand .mark {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 0 4px rgba(255, 90, 31, 0.2);
    flex-shrink: 0;
  }

  .brand h1 {
    font-size: 24px;
    letter-spacing: .12em;
    margin: 0;
    font-weight: 700;
  }

  .brand .freq {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: .05em;
    font-weight: 500;
  }

  /* Utility Header Buttons */
  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .theme-toggle-btn {
    background: var(--surface);
    color: var(--text);
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: transform 0.1s;
  }

  .theme-toggle-btn:active {
    transform: scale(0.97);
  }

  .theme-toggle-btn:focus-visible,
  .country-row:focus-visible,
  .tile:focus-visible,
  .pin:focus-visible,
  .icon-btn:focus-visible,
  input:focus-visible {
    outline: 3px solid var(--focus-ring);
    outline-offset: 2px;
  }

  .dial {
    margin-top: 18px;
    height: 4px;
    width: 100%;
    background: repeating-linear-gradient(90deg, var(--line) 0 2px, transparent 2px 8px);
    position: relative;
    border-radius: 2px;
    overflow: hidden;
  }

  .dial .sweep {
    position: absolute; top: 0; left: 0; height: 100%; width: 30%;
    background: linear-gradient(90deg, transparent, var(--signal), transparent);
    animation: sweep 3.2s linear infinite;
  }

  @media (prefers-reduced-motion: reduce) { .dial .sweep { animation: none; } }
  @keyframes sweep { from { left: -30%; } to { left: 100%; } }

  .search {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px;
  }

  .search input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 16px;
    width: 100%;
    font-family: inherit;
  }

  .search input::placeholder { color: var(--muted); }
  .search svg { flex-shrink: 0; opacity: .8; color: var(--text); }

  .install-btn {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    background: var(--text);
    color: var(--bg);
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    justify-content: center;
  }

  main { flex: 1; padding: 24px 0 48px; }

  /* ---------- Status Logs & Spinners ---------- */
  .status {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 80px 20px; color: var(--muted); text-align: center; font-size: 15px;
  }

  .status .spinner {
    width: 32px; height: 32px; border-radius: 50%;
    border: 3px solid var(--surface-2); border-top-color: var(--signal);
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- Pins ---------- */
  .section-label {
    font-size: 12px; letter-spacing: .12em; color: var(--muted);
    margin: 8px 2px 12px; font-weight: 700; text-transform: uppercase;
  }

  .pins {
    display: flex; gap: 10px; overflow-x: auto; padding-bottom: 16px; margin-bottom: 12px;
    scrollbar-width: none;
  }

  .pins::-webkit-scrollbar { display: none; }

  .pin {
    flex-shrink: 0;
    background: var(--surface);
    border: 2px solid var(--line);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
    transition: background-color 0.1s;
  }

  .pin:hover, .pin:focus { background: var(--surface-2); }
  .pin:active { transform: scale(.97); }
  .pin .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--tuned); }

  /* ---------- Responsive Country & Channel Displays ---------- */
  .country-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  @media (min-width: 640px) {
    .country-list {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (min-width: 960px) {
    .country-list {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  .country-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 20px;
    cursor: pointer;
    transition: background-color 0.15s, transform 0.1s;
  }

  .country-row:hover, .country-row:focus {
    background: var(--surface-2);
    transform: translateY(-1px);
  }

  .country-name { font-size: 16px; font-weight: 600; }
  .country-meta { display: flex; align-items: center; gap: 14px; }
  
  .bars { display: flex; gap: 3px; align-items: flex-end; height: 16px; }
  .bars span { width: 4px; background: var(--surface-2); border-radius: 1px; }
  .bars span.on { background: var(--tuned); }
  
  .count { font-size: 12px; color: var(--muted); min-width: 60px; text-align: right; font-weight: 500; }
  .empty { color: var(--muted); text-align: center; padding: 60px 20px; font-size: 15px; }

  /* ---------- Channel grid ---------- */
  .back-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 24px; cursor: pointer;
    background: none; border: none; padding: 0; color: inherit; width: fit-content;
  }

  .back-row .country-title { font-size: 22px; font-weight: 700; text-align: left; }
  .back-row .country-sub { font-size: 13px; color: var(--muted); margin-top: 3px; text-align: left; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 16px;
  }

  @media (min-width: 768px) {
    .grid {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
    }
  }

  .tile {
    background: var(--surface);
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    cursor: pointer;
    text-align: center;
    position: relative;
    transition: background-color 0.15s, transform 0.1s;
  }

  .tile:hover, .tile:focus {
    background: var(--surface-2);
    transform: translateY(-2px);
  }

  .logo-wrap {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    border: 2px solid var(--line);
    flex-shrink: 0;
  }

  .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .logo-wrap .initials {
    font-size: 20px; font-weight: 700; color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .tile-name {
    font-size: 13px; line-height: 1.4; font-weight: 600;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
  }

  /* ---------- High Contrast Media Player overlay ---------- */
  #player-overlay {
    position: fixed; inset: 0; background: #000000;
    display: none; flex-direction: column;
    z-index: 50;
  }

  #player-overlay.active { display: flex; }

  .player-top {
    display: flex; align-items: center; gap: 16px;
    padding: 16px;
    background: #111111;
    border-bottom: 2px solid #333333;
    color: #FFFFFF;
    flex-shrink: 0;
  }

  .player-top .pname { font-size: 16px; font-weight: 600; flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  
  .player-top .pcountry { font-size: 12px; color: #8E9CAE; display: block; margin-top: 2px; }
  
  video { width: 100%; flex: 1; background: #000; object-fit: contain; }

  .player-state {
    position: absolute; inset: 0; top: 60px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; color: #CCCCCC; font-size: 14px; text-align: center; padding: 0 30px;
    pointer-events: none;
    background: rgba(0,0,0,0.85);
  }

  .player-state.show { pointer-events: auto; }

  .player-state button {
    pointer-events: auto;
    background: #FFFFFF; border: 2px solid #FFFFFF; color: #000000;
    padding: 12px 24px; border-radius: var(--radius); font-size: 14px; font-weight: 700; cursor: pointer;
  }

  .player-state button:active { transform: scale(0.97); }

  .icon-btn {
    background: none; border: none; color: inherit;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 8px; border-radius: var(--radius);
  }

  .icon-btn:hover { background: var(--surface-2); }
  .player-top .icon-btn:hover { background: #222222; }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="header-top">
      <div class="brand">
        <span class="mark"></span>
        <h1>RELAY</h1>
        <span class="freq mono" id="freqLabel">TUNING…</span>
      </div>
      
      <div class="header-actions">
        <!-- 4. Theme Toggle Button -->
        <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle dark and light themes">
          <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform: rotate(0deg); transition: transform 0.5s ease;">
            <!-- Simple moon path inside SVG, dynamic switch on load -->
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <span id="themeText">DARK MODE</span>
        </button>
      </div>
    </div>

    <div class="dial"><div class="sweep" id="sweep"></div></div>
    
    <button id="installBtn" class="install-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Install RELAY PWA
    </button>
    
    <div class="search" id="searchWrap" style="display:none;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="Find a country or region…" autocomplete="off">
    </div>
  </header>

  <main id="main">
    <div class="status">
      <div class="spinner"></div>
      <div>Scanning global broadcast index…<br><span class="mono" style="opacity:.7; font-size: 13px; margin-top: 4px; display: inline-block;">iptv-org · index.country.m3u</span></div>
    </div>
  </main>
</div>

<div id="player-overlay">
  <div class="player-top">
    <button class="icon-btn" id="closePlayer" aria-label="Close Player" tabindex="0">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <div style="flex:1; overflow:hidden;">
      <span class="pname mono" id="pname">—</span>
      <span class="pcountry" id="pcountry"></span>
    </div>
  </div>
  <div style="position:relative; flex:1; display:flex; background:#000;">
    <video id="video" playsinline controls></video>
    <div class="player-state" id="playerState"></div>
  </div>
</div>

<script>
const M3U_URL = "https://iptv-org.github.io/iptv/index.country.m3u";
const PINS = ["Nigeria", "Spain", "United Kingdom", "Japan"];

let byCountry = {};        // country -> [channels]
let countryNames = [];     // sorted list
let currentView = "loading";      // loading | countries | grid | error
let currentCountry = null;
let currentChannelIdx = null;

const main = document.getElementById('main');
const freqLabel = document.getElementById('freqLabel');
const searchWrap = document.getElementById('searchWrap');
const searchInput = document.getElementById('searchInput');
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
const themeText = document.getElementById('themeText');
const themeMeta = document.getElementById('themeMeta');

/* ---------------- 4. Elegant Black & White Theme System ---------------- */
function initTheme() {
  const storedTheme = localStorage.getItem('relay_theme');
  if (storedTheme === 'dark' || (!storedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    enableDarkMode();
  } else {
    enableLightMode();
  }
}

function enableDarkMode() {
  document.body.classList.add('dark-theme');
  themeText.textContent = "LIGHT MODE";
  themeMeta.setAttribute('content', '#000000');
  themeIcon.innerHTML = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
  localStorage.setItem('relay_theme', 'dark');
}

function enableLightMode() {
  document.body.classList.remove('dark-theme');
  themeText.textContent = "DARK MODE";
  themeMeta.setAttribute('content', '#FFFFFF');
  themeIcon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
  localStorage.setItem('relay_theme', 'light');
}

themeToggle.addEventListener('click', () => {
  if (document.body.classList.contains('dark-theme')) {
    enableLightMode();
  } else {
    enableDarkMode();
  }
});

/* ---------------- Helpers ---------------- */
function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function initials(name){
  const words = name.trim().split(/\s+/).filter(Boolean);
  if(words.length === 0) return "?";
  if(words.length === 1) return words[0].slice(0,2).toUpperCase();
  return (words[0][0] + words[1][0]).toUpperCase();
}

function parseM3U(text){
  const lines = text.split('\n');
  const channels = [];
  let pending = null;
  for(let raw of lines){
    const line = raw.trim();
    if(line.startsWith('#EXTINF')){
      const logoMatch = line.match(/tvg-logo="([^"]*)"/);
      const groupMatch = line.match(/group-title="([^"]*)"/);
      const nameMatch = line.match(/,(.*)$/);
      pending = {
        logo: logoMatch ? logoMatch[1] : '',
        country: groupMatch ? groupMatch[1] : 'Unsorted',
        name: nameMatch ? nameMatch[1].trim() : 'Unnamed channel'
      };
    } else if(line && !line.startsWith('#') && pending){
      pending.url = line;
      channels.push(pending);
      pending = null;
    }
  }
  return channels;
}

/* ---------------- 2. TV Navigation State Machine (Routing System) ---------------- */
// Push custom app states into the HTML5 history sandbox so "Back" moves backward internally instead of leaving PWA
function navigateTo(viewName, params = {}) {
  currentView = viewName;
  const stateObj = { view: viewName, ...params };
  window.history.pushState(stateObj, "");
}

// Global popstate handles back-tracking perfectly
window.addEventListener('popstate', (event) => {
  const state = event.state;
  if (!state || state.view === "countries") {
    showCountriesView(false);
  } else if (state.view === "grid") {
    openCountry(state.country, false);
  } else if (state.view === "player") {
    playChannel(state.country, state.channelIdx, false);
  }
});

// Hardware remote control back buttons keypress monitoring (ESC, remote BACK)
window.addEventListener('keydown', (e) => {
  const backKeys = [4, 8, 27]; // Android/TV back code, Backspace, Escape
  if (backKeys.includes(e.keyCode) || e.key === 'GoBack') {
    if (document.getElementById('player-overlay').classList.contains('active')) {
      e.preventDefault();
      closePlayer(); // closes stream, auto triggers state pops
    } else if (currentView === "grid") {
      e.preventDefault();
      window.history.back(); // safely navigate back to main index
    }
  }
});


/* ---------------- App Initialization & API Fetching ---------------- */
async function loadPlaylist(){
  try{
    const res = await fetch(M3U_URL, {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const channels = parseM3U(text);
    if(channels.length === 0) throw new Error("Empty playlist");

    byCountry = {};
    for(const ch of channels){
      const key = ch.country || "Unsorted";
      if(!byCountry[key]) byCountry[key] = [];
      byCountry[key].push(ch);
    }
    countryNames = Object.keys(byCountry).sort((a,b)=>a.localeCompare(b));
    freqLabel.textContent = countryNames.length + " COUNTRIES · " + channels.length + " SIGNALS";
    
    // Set up initial replace state for history tracking
    window.history.replaceState({ view: "countries" }, "");
    showCountriesView(false);
  } catch(err) {
    currentView = "error";
    freqLabel.textContent = "NO SIGNAL";
    main.innerHTML = `
      <div class="status">
        <div style="color:var(--danger); font-size:32px; font-weight:bold;">⚠</div>
        <div style="font-size: 16px;">Couldn't tune to the broadcast index.<br>Verify network configuration and source feed.</div>
        <button onclick="location.reload()" tabindex="0" style="margin-top:20px; background:var(--surface); border:2px solid var(--line); color:var(--text); padding:12px 24px; border-radius:var(--radius); font-weight:700; cursor:pointer;">RESCAN BAND</button>
      </div>`;
  }
}

function maxCount(){
  return Math.max(...countryNames.map(c => byCountry[c].length), 1);
}

function barsHtml(count, max){
  const levels = 5;
  const filled = Math.max(1, Math.round((count / max) * levels));
  let html = '<div class="bars">';
  for(let i=0; i<levels; i++){
    const h = 4 + i*2.5;
    html += `<span class="${i<filled?'on':''}" style="height:${h}px;"></span>`;
  }
  html += '</div>';
  return html;
}

function showCountriesView(shouldPushState = true) {
  if (shouldPushState) {
    navigateTo("countries");
  }
  currentView = "countries";
  closePlayerOverlayOnly();
  searchWrap.style.display = "flex";
  renderCountries(searchInput.value);
}

function renderCountries(filter){
  const max = maxCount();
  const filterLc = (filter||"").trim().toLowerCase();
  const list = filterLc
    ? countryNames.filter(c => c.toLowerCase().includes(filterLc))
    : countryNames;

  let pinsHtml = "";
  if(!filterLc){
    const validPins = PINS.filter(p => byCountry[p]);
    if(validPins.length){
      pinsHtml = `
        <div class="section-label">QUICK TUNE</div>
        <div class="pins">
          ${validPins.map(p => `<div class="pin" data-country="${escapeHtml(p)}" tabindex="0"><span class="dot"></span>${escapeHtml(p)}</div>`).join('')}
        </div>`;
    }
  }

  const rows = list.map(c => {
    const n = byCountry[c].length;
    return `
      <div class="country-row" data-country="${escapeHtml(c)}" tabindex="0" role="button" aria-label="Open broadcasts for ${escapeHtml(c)}">
        <span class="country-name">${escapeHtml(c)}</span>
        <span class="country-meta">
          ${barsHtml(n, max)}
          <span class="count mono">${n} sig.</span>
        </span>
      </div>`;
  }).join('');

  main.innerHTML = `
    ${pinsHtml}
    <div class="section-label">${filterLc ? 'MATCHES' : 'ALL COUNTRIES'}</div>
    <div class="country-list">
      ${rows || '<div class="empty">No transmission matches.</div>'}
    </div>
  `;

  // Dynamic Event Wiring + Keyboard activation helper
  const addTriggerEvents = (element) => {
    const action = () => openCountry(element.getAttribute('data-country'));
    element.addEventListener('click', action);
    element.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        action();
      }
    });
  };

  main.querySelectorAll('.country-row, .pin').forEach(addTriggerEvents);
}

function openCountry(country, shouldPushState = true){
  if (shouldPushState) {
    navigateTo("grid", { country: country });
  }
  currentCountry = country;
  currentView = "grid";
  closePlayerOverlayOnly();
  
  const channels = byCountry[country] || [];

  const tiles = channels.map((ch, idx) => {
    return `
      <div class="tile" data-idx="${idx}" tabindex="0" role="button" aria-label="Tune into ${escapeHtml(ch.name)}">
        <div class="logo-wrap">
          ${ch.logo
            ? `<img src="${escapeHtml(ch.logo)}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=&quot;initials&quot;>${initials(ch.name)}</span>'">`
            : `<span class="initials">${initials(ch.name)}</span>`}
        </div>
        <div class="tile-name">${escapeHtml(ch.name)}</div>
      </div>`;
  }).join('');

  main.innerHTML = `
    <button class="back-row" id="backToCountries" tabindex="0" aria-label="Back to countries">
      <div class="icon-btn" style="border: 2px solid var(--line); display: inline-flex;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>
      <div>
        <div class="country-title">${escapeHtml(country)}</div>
        <div class="country-sub mono">${channels.length} broadcast signals online</div>
      </div>
    </button>
    <div class="grid">${tiles || '<div class="empty">No transmission elements registered.</div>'}</div>
  `;

  // Back trigger action
  const goBackAction = () => window.history.back();
  const backBtn = document.getElementById('backToCountries');
  backBtn.addEventListener('click', goBackAction);
  backBtn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goBackAction(); }
  });

  main.querySelectorAll('.tile').forEach(el => {
    const idx = parseInt(el.getAttribute('data-idx'), 10);
    const playAction = () => playChannel(country, idx);
    el.addEventListener('click', playAction);
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        playAction();
      }
    });
  });
}

/* ---------------- Player Control System ---------------- */
const overlay = document.getElementById('player-overlay');
const video = document.getElementById('video');
const pname = document.getElementById('pname');
const pcountry = document.getElementById('pcountry');
const playerState = document.getElementById('playerState');
let hls = null;
let watchdog = null;

function setPlayerState(html, show){
  playerState.innerHTML = html;
  playerState.classList.toggle('show', !!show);
}

function playChannel(country, idx, shouldPushState = true){
  const ch = byCountry[country][idx];
  if(!ch) return;

  if (shouldPushState) {
    navigateTo("player", { country: country, channelIdx: idx });
  }

  currentCountry = country;
  currentChannelIdx = idx;

  overlay.classList.add('active');
  pname.textContent = ch.name;
  pcountry.textContent = country;
  setPlayerState(`<div class="spinner" style="width:32px; height:32px; border:3px solid #333; border-top-color:var(--signal); border-radius:50%; animation:spin .8s linear infinite;"></div><div style="margin-top: 10px; font-weight: 600;">Locking Phase Signal…</div>`, true);

  cleanupPlayer();

  // Watchdog system checks link response timeouts (12 seconds default)
  watchdog = setTimeout(() => {
    setPlayerState(`<div style="color:var(--danger); font-weight:bold; font-size:16px;">Signal Tuner Timeout</div><div style="font-size:12px; margin-top:4px;">No active HLS carrier wave detected.</div><button id="retryBtn" style="margin-top:16px;">Retuning Signal</button>`, true);
    document.getElementById('retryBtn')?.focus();
    document.getElementById('retryBtn')?.addEventListener('click', () => playChannel(country, idx, false));
  }, 12000);

  video.addEventListener('playing', onPlaying, {once:true});
  video.addEventListener('error', onVideoError, {once:true});

  if(window.Hls && window.Hls.isSupported()){
    hls = new Hls({ 
      maxBufferLength: 30,
      manifestLoadingMaxRetry: 3,
      levelLoadingMaxRetry: 3
    });
    hls.loadSource(ch.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.ERROR, (event, data) => {
      if(data.fatal) onVideoError();
    });
    video.play().catch(()=>{});
  } else if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src = ch.url;
    video.play().catch(()=>{});
  } else {
    video.src = ch.url;
    video.play().catch(()=>{});
  }
}

function onPlaying(){
  clearTimeout(watchdog);
  setPlayerState("", false);
  video.focus();
}

function onVideoError(){
  clearTimeout(watchdog);
  setPlayerState(`<div style="color:var(--danger); font-weight:bold; font-size:16px;">Loss of Transmission Carrier</div><div style="font-size:12px; margin-top:4px;">Cannot parse media feed elements.</div><button id="retryBtn2" style="margin-top:16px;">Go Back</button>`, true);
  document.getElementById('retryBtn2')?.focus();
  document.getElementById('retryBtn2')?.addEventListener('click', closePlayer);
}

function cleanupPlayer(){
  if(hls){ hls.destroy(); hls = null; }
  video.removeAttribute('src');
  video.load();
  clearTimeout(watchdog);
}

function closePlayerOverlayOnly() {
  cleanupPlayer();
  overlay.classList.remove('active');
  setPlayerState("", false);
}

function closePlayer(){
  closePlayerOverlayOnly();
  window.history.back(); // Pops state in history to sync screen state representation
}

document.getElementById('closePlayer').addEventListener('click', closePlayer);
document.getElementById('closePlayer').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    closePlayer();
  }
});

/* ---------------- Search ---------------- */
searchInput.addEventListener('input', (e) => {
  if(currentView === "countries") renderCountries(e.target.value);
});

/* ---------------- Setup Application ---------------- */
initTheme();
loadPlaylist();

/* ---------------- PWA integration ---------------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

let deferredInstall = null;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstall = e;
  if(installBtn) installBtn.style.display = 'flex';
});

if(installBtn){
  installBtn.addEventListener('click', async () => {
    if(!deferredInstall) return;
    deferredInstall.prompt();
    await deferredInstall.userChoice;
    deferredInstall = null;
    installBtn.style.display = 'none';
  });
}

window.addEventListener('appinstalled', () => {
  if(installBtn) installBtn.style.display = 'none';
});
</script>
