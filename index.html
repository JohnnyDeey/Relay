<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RELAY — World Broadcast Tuner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFFFFF" id="themeMeta">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RELAY">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="shortcut icon" href="icons/favicon.ico">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<style>
  :root {
    --bg: #FFFFFF;
    --surface: #F9FBFD;
    --surface-2: #E8EDF2;
    --line: #000000;
    --text: #000000;
    --muted: #5A6573;
    --signal: #FF5A1F;
    --tuned: #0D9488;
    --danger: #E11D48;
    --radius: 6px;
    --focus-ring: #2563EB;
  }

  body.dark-theme {
    --bg: #000000;
    --surface: #101419;
    --surface-2: #1B232E;
    --line: #2D394A;
    --text: #E8EDF2;
    --muted: #8E9CAE;
    --signal: #FF6B35;
    --tuned: #2DD4BF;
    --danger: #FB7185;
    --focus-ring: #38BDF8;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    transition: background-color 0.2s, color 0.2s, border-color 0.2s;
  }

  .mono { font-family: 'IBM Plex Mono', monospace; }
  button { font-family: inherit; }

  #app {
    max-width: 1200px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    padding: 0 16px;
  }

  header {
    padding: 24px 0 16px;
    border-bottom: 2px solid var(--line);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 5;
    transition: background-color 0.2s;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .brand { display: flex; align-items: center; gap: 10px; }

  .brand .mark {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 0 4px rgba(255, 90, 31, 0.2);
    flex-shrink: 0;
  }

  .brand h1 { font-size: 24px; letter-spacing: .12em; margin: 0; font-weight: 700; }
  .brand .freq { color: var(--muted); font-size: 13px; letter-spacing: .05em; font-weight: 500; }

  .header-actions { display: flex; align-items: center; gap: 12px; }

  .theme-toggle-btn {
    background: var(--surface);
    color: var(--text);
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: transform 0.1s;
  }

  .theme-toggle-btn:active { transform: scale(0.97); }

  .theme-toggle-btn:focus-visible,
  .country-row:focus-visible,
  .tile:focus-visible,
  .pin:focus-visible,
  .icon-btn:focus-visible,
  input:focus-visible {
    outline: 3px solid var(--focus-ring);
    outline-offset: 2px;
  }

  .dial {
    margin-top: 18px;
    height: 4px;
    width: 100%;
    background: repeating-linear-gradient(90deg, var(--line) 0 2px, transparent 2px 8px);
    position: relative;
    border-radius: 2px;
    overflow: hidden;
  }

  .dial .sweep {
    position: absolute; top: 0; left: 0; height: 100%; width: 30%;
    background: linear-gradient(90deg, transparent, var(--signal), transparent);
    animation: sweep 3.2s linear infinite;
  }

  @media (prefers-reduced-motion: reduce) { .dial .sweep { animation: none; } }
  @keyframes sweep { from { left: -30%; } to { left: 100%; } }

  .search {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px;
  }

  .search input {
    background: none; border: none; outline: none;
    color: var(--text); font-size: 16px; width: 100%; font-family: inherit;
  }

  .search input::placeholder { color: var(--muted); }
  .search svg { flex-shrink: 0; opacity: .8; color: var(--text); }

  .install-btn {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    background: var(--text);
    color: var(--bg);
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    justify-content: center;
  }

  main { flex: 1; padding: 24px 0 48px; }

  .status {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 80px 20px; color: var(--muted); text-align: center; font-size: 15px;
  }

  .status .spinner {
    width: 32px; height: 32px; border-radius: 50%;
    border: 3px solid var(--surface-2); border-top-color: var(--signal);
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .section-label {
    font-size: 12px; letter-spacing: .12em; color: var(--muted);
    margin: 8px 2px 12px; font-weight: 700; text-transform: uppercase;
  }

  .pins {
    display: flex; gap: 10px; overflow-x: auto; padding-bottom: 16px; margin-bottom: 12px;
    scrollbar-width: none;
  }

  .pins::-webkit-scrollbar { display: none; }

  .pin {
    flex-shrink: 0;
    background: var(--surface);
    border: 2px solid var(--line);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
    transition: background-color 0.1s;
  }

  .pin:hover, .pin:focus { background: var(--surface-2); }
  .pin:active { transform: scale(.97); }
  .pin .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--tuned); }

  .country-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  @media (min-width: 640px) { .country-list { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 960px) { .country-list { grid-template-columns: repeat(3, 1fr); } }

  .country-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 20px;
    cursor: pointer;
    transition: background-color 0.15s, transform 0.1s;
  }

  .country-row:hover, .country-row:focus {
    background: var(--surface-2);
    transform: translateY(-1px);
  }

  .country-name { font-size: 16px; font-weight: 600; }
  .country-meta { display: flex; align-items: center; gap: 14px; }

  .bars { display: flex; gap: 3px; align-items: flex-end; height: 16px; }
  .bars span { width: 4px; background: var(--surface-2); border-radius: 1px; }
  .bars span.on { background: var(--tuned); }

  .count { font-size: 12px; color: var(--muted); min-width: 60px; text-align: right; font-weight: 500; }
  .empty { color: var(--muted); text-align: center; padding: 60px 20px; font-size: 15px; }

  .back-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 24px; cursor: pointer;
    background: none; border: none; padding: 0; color: inherit; width: fit-content;
  }

  .back-row .country-title { font-size: 22px; font-weight: 700; text-align: left; }
  .back-row .country-sub { font-size: 13px; color: var(--muted); margin-top: 3px; text-align: left; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 16px;
  }

  @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; } }

  .tile {
    background: var(--surface);
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    cursor: pointer;
    text-align: center;
    position: relative;
    transition: background-color 0.15s, transform 0.1s;
  }

  .tile:hover, .tile:focus { background: var(--surface-2); transform: translateY(-2px); }

  .logo-wrap {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    border: 2px solid var(--line);
    flex-shrink: 0;
  }

  .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .logo-wrap .initials { font-size: 20px; font-weight: 700; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

  .tile-name {
    font-size: 13px; line-height: 1.4; font-weight: 600;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
  }

  /* =====================================================
     PLAYER OVERLAY — fully custom controls, no native UI
     ===================================================== */
  #player-overlay {
    position: fixed; inset: 0;
    background: #000000;
    display: none; flex-direction: column;
    z-index: 50;
  }

  #player-overlay.active { display: flex; }

  /* The video fills everything — NO native controls */
  #video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: #000;
    object-fit: contain;
    /* controls attribute removed — we manage UI ourselves */
  }

  /* ---- Loading / error state centered over video ---- */
  #playerState {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(0,0,0,0.82);
    color: #ccc;
    font-size: 14px;
    text-align: center;
    padding: 0 30px;
    z-index: 3;
    pointer-events: none;
  }

  #playerState.show {
    display: flex;
    pointer-events: auto;
  }

  #playerState button {
    pointer-events: auto;
    background: #fff; border: 2px solid #fff; color: #000;
    padding: 12px 24px; border-radius: 6px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    margin-top: 8px;
  }

  /* ---- Custom control bar — slides in/out ---- */
  #playerControls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 4;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 70%, transparent 100%);
    padding: 48px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: opacity 0.35s ease, transform 0.35s ease;
    /* start visible */
  }

  #playerControls.hidden {
    opacity: 0;
    transform: translateY(10px);
    pointer-events: none;
  }

  .ctrl-top {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .ctrl-info { flex: 1; overflow: hidden; }
  .ctrl-name { font-size: 16px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ctrl-country { font-size: 12px; color: #8E9CAE; margin-top: 2px; }

  .ctrl-btn {
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.25);
    color: #fff;
    border-radius: 8px;
    width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn:hover, .ctrl-btn:focus { background: rgba(255,255,255,0.25); outline: none; }
  .ctrl-btn:focus-visible { outline: 3px solid #38BDF8; outline-offset: 2px; }
  .ctrl-btn:active { transform: scale(0.92); }

  /* Big center play/pause button */
  #playPauseBtn {
    width: 68px; height: 68px;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.4);
  }

  /* Progress bar row */
  .ctrl-bottom {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .time-label { font-size: 12px; color: #ccc; font-family: 'IBM Plex Mono', monospace; min-width: 40px; }

  /* Seek bar — live streams get a pulsing dot instead */
  .progress-wrap {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
    overflow: hidden;
  }

  #progressBar {
    height: 100%;
    width: 0%;
    background: #FF5A1F;
    border-radius: 2px;
    transition: width 0.5s linear;
  }

  /* LIVE badge shown for live/non-seekable streams */
  #liveBadge {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    letter-spacing: .08em;
  }

  #liveBadge .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #FF5A1F;
    animation: livepulse 1.4s ease-in-out infinite;
  }

  @keyframes livepulse { 0%,100% { opacity:1; } 50% { opacity: 0.3; } }

  /* Header bar at top — same back button */
  #playerHeader {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 4;
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
    transition: opacity 0.35s ease;
  }

  #playerHeader.hidden { opacity: 0; pointer-events: none; }

  .icon-btn {
    background: none; border: none; color: inherit;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 8px; border-radius: var(--radius);
  }

  .icon-btn:hover { background: rgba(255,255,255,0.12); }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="header-top">
      <div class="brand">
        <span class="mark"></span>
        <h1>RELAY</h1>
        <span class="freq mono" id="freqLabel">TUNING…</span>
      </div>
      <div class="header-actions">
        <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle dark and light themes">
          <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <span id="themeText">DARK MODE</span>
        </button>
      </div>
    </div>

    <div class="dial"><div class="sweep" id="sweep"></div></div>

    <button id="installBtn" class="install-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Install RELAY PWA
    </button>

    <div class="search" id="searchWrap" style="display:none;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="Find a country or region…" autocomplete="off">
    </div>
  </header>

  <main id="main">
    <div class="status">
      <div class="spinner"></div>
      <div>Scanning global broadcast index…<br><span class="mono" style="opacity:.7; font-size: 13px; margin-top: 4px; display: inline-block;">iptv-org · index.country.m3u</span></div>
    </div>
  </main>
</div>

<!-- ===================== PLAYER OVERLAY ===================== -->
<div id="player-overlay">

  <!-- Raw video — no controls attribute! -->
  <video id="video" playsinline></video>

  <!-- Loading / error messages -->
  <div id="playerState"></div>

  <!-- Top gradient bar with back button -->
  <div id="playerHeader">
    <button class="ctrl-btn" id="closePlayer" aria-label="Close player" style="width:44px;height:44px;border-radius:50%;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </button>
  </div>

  <!-- Custom control bar at bottom -->
  <div id="playerControls">
    <div class="ctrl-top">
      <div class="ctrl-info">
        <div class="ctrl-name mono" id="pname">—</div>
        <div class="ctrl-country" id="pcountry"></div>
      </div>

      <!-- Fullscreen toggle -->
      <button class="ctrl-btn" id="fsBtn" aria-label="Toggle fullscreen">
        <svg id="fsIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
    </div>

    <div class="ctrl-bottom">
      <!-- Play / Pause centered -->
      <button class="ctrl-btn" id="playPauseBtn" aria-label="Play or pause">
        <svg id="ppIcon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <!-- pause icon by default while playing -->
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>

      <!-- Live badge / progress bar -->
      <div id="liveBadge">
        <span class="live-dot"></span>
        LIVE
      </div>

      <div class="progress-wrap" id="progressWrap" style="display:none;">
        <div id="progressBar"></div>
      </div>

      <span class="time-label" id="timeLabel"></span>

      <!-- Volume mute toggle -->
      <button class="ctrl-btn" id="muteBtn" aria-label="Toggle mute">
        <svg id="muteIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </div>
  </div>

</div><!-- /player-overlay -->

<script>
const M3U_URL = "https://iptv-org.github.io/iptv/index.country.m3u";
const PINS = ["Nigeria", "Spain", "United Kingdom", "Japan"];

let byCountry = {};
let countryNames = [];
let currentView = "loading";
let currentCountry = null;
let currentChannelIdx = null;

const mainEl       = document.getElementById('main');
const freqLabel    = document.getElementById('freqLabel');
const searchWrap   = document.getElementById('searchWrap');
const searchInput  = document.getElementById('searchInput');
const themeToggle  = document.getElementById('themeToggle');
const themeIcon    = document.getElementById('themeIcon');
const themeText    = document.getElementById('themeText');
const themeMeta    = document.getElementById('themeMeta');

/* ---- Theme ---- */
function initTheme() {
  const stored = localStorage.getItem('relay_theme');
  if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    enableDarkMode();
  } else {
    enableLightMode();
  }
}

function enableDarkMode() {
  document.body.classList.add('dark-theme');
  themeText.textContent = "LIGHT MODE";
  themeMeta.setAttribute('content', '#000000');
  themeIcon.innerHTML = `<circle cx="12" cy="12" r="5"></circle>
    <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
    <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
  localStorage.setItem('relay_theme', 'dark');
}

function enableLightMode() {
  document.body.classList.remove('dark-theme');
  themeText.textContent = "DARK MODE";
  themeMeta.setAttribute('content', '#FFFFFF');
  themeIcon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
  localStorage.setItem('relay_theme', 'light');
}

themeToggle.addEventListener('click', () => {
  document.body.classList.contains('dark-theme') ? enableLightMode() : enableDarkMode();
});

/* ---- Helpers ---- */
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function initials(name) {
  const w = name.trim().split(/\s+/).filter(Boolean);
  if (!w.length) return "?";
  if (w.length === 1) return w[0].slice(0,2).toUpperCase();
  return (w[0][0] + w[1][0]).toUpperCase();
}

function parseM3U(text) {
  const lines = text.split('\n');
  const channels = [];
  let pending = null;
  for (let raw of lines) {
    const line = raw.trim();
    if (line.startsWith('#EXTINF')) {
      const logoMatch  = line.match(/tvg-logo="([^"]*)"/);
      const groupMatch = line.match(/group-title="([^"]*)"/);
      const nameMatch  = line.match(/,(.*)$/);
      pending = {
        logo: logoMatch ? logoMatch[1] : '',
        country: groupMatch ? groupMatch[1] : 'Unsorted',
        name: nameMatch ? nameMatch[1].trim() : 'Unnamed channel'
      };
    } else if (line && !line.startsWith('#') && pending) {
      pending.url = line;
      channels.push(pending);
      pending = null;
    }
  }
  return channels;
}

/* ---- Routing ---- */
function navigateTo(viewName, params = {}) {
  currentView = viewName;
  window.history.pushState({ view: viewName, ...params }, "");
}

window.addEventListener('popstate', (event) => {
  const state = event.state;
  if (!state || state.view === "countries") {
    showCountriesView(false);
  } else if (state.view === "grid") {
    openCountry(state.country, false);
  } else if (state.view === "player") {
    playChannel(state.country, state.channelIdx, false);
  }
});

window.addEventListener('keydown', (e) => {
  const backKeys = [4, 8, 27];
  if (backKeys.includes(e.keyCode) || e.key === 'GoBack') {
    if (document.getElementById('player-overlay').classList.contains('active')) {
      e.preventDefault();
      closePlayer();
    } else if (currentView === "grid") {
      e.preventDefault();
      window.history.back();
    }
  }
  // D-pad OK/Enter on TV remotes triggers the focused element
  if (e.keyCode === 13 || e.key === 'Enter') {
    const focused = document.activeElement;
    if (focused && focused !== document.body) focused.click();
  }
});

/* ---- Load playlist ---- */
async function loadPlaylist() {
  try {
    const res = await fetch(M3U_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const channels = parseM3U(text);
    if (channels.length === 0) throw new Error("Empty playlist");

    byCountry = {};
    for (const ch of channels) {
      const key = ch.country || "Unsorted";
      if (!byCountry[key]) byCountry[key] = [];
      byCountry[key].push(ch);
    }
    countryNames = Object.keys(byCountry).sort((a, b) => a.localeCompare(b));
    freqLabel.textContent = countryNames.length + " COUNTRIES · " + channels.length + " SIGNALS";

    window.history.replaceState({ view: "countries" }, "");
    showCountriesView(false);
  } catch (err) {
    currentView = "error";
    freqLabel.textContent = "NO SIGNAL";
    mainEl.innerHTML = `
      <div class="status">
        <div style="color:var(--danger); font-size:32px; font-weight:bold;">⚠</div>
        <div style="font-size: 16px;">Couldn't tune to the broadcast index.<br>Verify network configuration and source feed.</div>
        <button onclick="location.reload()" tabindex="0" style="margin-top:20px; background:var(--surface); border:2px solid var(--line); color:var(--text); padding:12px 24px; border-radius:var(--radius); font-weight:700; cursor:pointer;">RESCAN BAND</button>
      </div>`;
  }
}

function maxCount() {
  return Math.max(...countryNames.map(c => byCountry[c].length), 1);
}

function barsHtml(count, max) {
  const levels = 5;
  const filled = Math.max(1, Math.round((count / max) * levels));
  let html = '<div class="bars">';
  for (let i = 0; i < levels; i++) {
    const h = 4 + i * 2.5;
    html += `<span class="${i < filled ? 'on' : ''}" style="height:${h}px;"></span>`;
  }
  return html + '</div>';
}

function showCountriesView(shouldPushState = true) {
  if (shouldPushState) navigateTo("countries");
  currentView = "countries";
  closePlayerOverlayOnly();
  searchWrap.style.display = "flex";
  renderCountries(searchInput.value);
}

function renderCountries(filter) {
  const max = maxCount();
  const filterLc = (filter || "").trim().toLowerCase();
  const list = filterLc ? countryNames.filter(c => c.toLowerCase().includes(filterLc)) : countryNames;

  let pinsHtml = "";
  if (!filterLc) {
    const validPins = PINS.filter(p => byCountry[p]);
    if (validPins.length) {
      pinsHtml = `
        <div class="section-label">QUICK TUNE</div>
        <div class="pins">
          ${validPins.map(p => `<div class="pin" data-country="${escapeHtml(p)}" tabindex="0"><span class="dot"></span>${escapeHtml(p)}</div>`).join('')}
        </div>`;
    }
  }

  const rows = list.map(c => {
    const n = byCountry[c].length;
    return `
      <div class="country-row" data-country="${escapeHtml(c)}" tabindex="0" role="button" aria-label="Open broadcasts for ${escapeHtml(c)}">
        <span class="country-name">${escapeHtml(c)}</span>
        <span class="country-meta">
          ${barsHtml(n, max)}
          <span class="count mono">${n} sig.</span>
        </span>
      </div>`;
  }).join('');

  mainEl.innerHTML = `
    ${pinsHtml}
    <div class="section-label">${filterLc ? 'MATCHES' : 'ALL COUNTRIES'}</div>
    <div class="country-list">
      ${rows || '<div class="empty">No transmission matches.</div>'}
    </div>`;

  const addTrigger = (el) => {
    const action = () => openCountry(el.getAttribute('data-country'));
    el.addEventListener('click', action);
    el.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); action(); } });
  };
  mainEl.querySelectorAll('.country-row, .pin').forEach(addTrigger);
}

function openCountry(country, shouldPushState = true) {
  if (shouldPushState) navigateTo("grid", { country });
  currentCountry = country;
  currentView = "grid";
  closePlayerOverlayOnly();

  const channels = byCountry[country] || [];
  const tiles = channels.map((ch, idx) => `
    <div class="tile" data-idx="${idx}" tabindex="0" role="button" aria-label="Tune into ${escapeHtml(ch.name)}">
      <div class="logo-wrap">
        ${ch.logo
          ? `<img src="${escapeHtml(ch.logo)}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=&quot;initials&quot;>${initials(ch.name)}</span>'">`
          : `<span class="initials">${initials(ch.name)}</span>`}
      </div>
      <div class="tile-name">${escapeHtml(ch.name)}</div>
    </div>`).join('');

  mainEl.innerHTML = `
    <button class="back-row" id="backToCountries" tabindex="0" aria-label="Back to countries">
      <div class="icon-btn" style="border: 2px solid var(--line); display: inline-flex;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
      </div>
      <div>
        <div class="country-title">${escapeHtml(country)}</div>
        <div class="country-sub mono">${channels.length} broadcast signals online</div>
      </div>
    </button>
    <div class="grid">${tiles || '<div class="empty">No transmission elements registered.</div>'}</div>`;

  const goBack = () => window.history.back();
  const backBtn = document.getElementById('backToCountries');
  backBtn.addEventListener('click', goBack);
  backBtn.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goBack(); } });

  mainEl.querySelectorAll('.tile').forEach(el => {
    const idx = parseInt(el.getAttribute('data-idx'), 10);
    const play = () => playChannel(country, idx);
    el.addEventListener('click', play);
    el.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); play(); } });
  });
}

/* =====================================================
   PLAYER — Custom controls, no native browser UI
   ===================================================== */
const overlay       = document.getElementById('player-overlay');
const video         = document.getElementById('video');
const playerState   = document.getElementById('playerState');
const playerHeader  = document.getElementById('playerHeader');
const playerCtrls   = document.getElementById('playerControls');
const pname         = document.getElementById('pname');
const pcountry      = document.getElementById('pcountry');
const playPauseBtn  = document.getElementById('playPauseBtn');
const ppIcon        = document.getElementById('ppIcon');
const muteBtn       = document.getElementById('muteBtn');
const muteIcon      = document.getElementById('muteIcon');
const fsBtn         = document.getElementById('fsBtn');
const fsIcon        = document.getElementById('fsIcon');
const liveBadge     = document.getElementById('liveBadge');
const progressWrap  = document.getElementById('progressWrap');
const progressBar   = document.getElementById('progressBar');
const timeLabel     = document.getElementById('timeLabel');

let hls = null;
let watchdog = null;
let hideControlsTimer = null;
let controlsVisible = true;

/* -- Control bar visibility -- */
function showControls() {
  playerHeader.classList.remove('hidden');
  playerCtrls.classList.remove('hidden');
  controlsVisible = true;
  scheduleHideControls();
}

function scheduleHideControls() {
  clearTimeout(hideControlsTimer);
  if (!video.paused) {
    hideControlsTimer = setTimeout(hideControls, 3500);
  }
}

function hideControls() {
  playerHeader.classList.add('hidden');
  playerCtrls.classList.add('hidden');
  controlsVisible = false;
}

function toggleControls() {
  controlsVisible ? hideControls() : showControls();
}

// Tap/click anywhere on video toggles controls
video.addEventListener('click', toggleControls);
video.addEventListener('touchend', (e) => { e.preventDefault(); toggleControls(); });

// Mouse move on desktop/TV browsers shows controls
overlay.addEventListener('mousemove', showControls);

/* -- Play / Pause -- */
function updatePlayIcon() {
  if (video.paused) {
    ppIcon.innerHTML = `<polygon points="5 3 19 12 5 21 5 3"/>`;
    clearTimeout(hideControlsTimer); // keep controls visible while paused
  } else {
    ppIcon.innerHTML = `<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>`;
    scheduleHideControls();
  }
}

playPauseBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (video.paused) { video.play().catch(() => {}); } else { video.pause(); }
  showControls();
});

video.addEventListener('play',  updatePlayIcon);
video.addEventListener('pause', updatePlayIcon);

/* -- Mute -- */
const UNMUTED_SVG = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
  <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
  <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>`;
const MUTED_SVG = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
  <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>`;

muteBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  video.muted = !video.muted;
  muteIcon.innerHTML = video.muted ? MUTED_SVG : UNMUTED_SVG;
  showControls();
});

/* -- Progress / time -- */
function isLiveStream() {
  return !isFinite(video.duration) || video.duration === 0;
}

function updateProgress() {
  if (isLiveStream()) {
    liveBadge.style.display = 'flex';
    progressWrap.style.display = 'none';
    timeLabel.textContent = '';
  } else {
    liveBadge.style.display = 'none';
    progressWrap.style.display = 'block';
    const pct = video.duration ? (video.currentTime / video.duration) * 100 : 0;
    progressBar.style.width = pct + '%';
    timeLabel.textContent = fmt(video.currentTime);
  }
}

function fmt(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

video.addEventListener('timeupdate', updateProgress);
video.addEventListener('durationchange', updateProgress);

progressWrap.addEventListener('click', (e) => {
  if (isLiveStream()) return;
  e.stopPropagation();
  const rect = progressWrap.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  video.currentTime = ratio * video.duration;
  showControls();
});

/* -- Fullscreen -- */
function toggleFullscreen() {
  const el = document.getElementById('player-overlay');
  try {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen).call(document);
    }
  } catch(e) {}
}

fsBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleFullscreen();
  showControls();
});

document.addEventListener('fullscreenchange', updateFsIcon);
document.addEventListener('webkitfullscreenchange', updateFsIcon);

function updateFsIcon() {
  const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  fsIcon.innerHTML = isFs
    ? `<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
       <line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>`
    : `<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
       <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>`;
}

/* -- D-pad keyboard controls for TV remotes -- */
document.addEventListener('keydown', (e) => {
  if (!overlay.classList.contains('active')) return;

  // Show controls on any key press during playback
  showControls();

  switch (e.keyCode) {
    case 179: // MediaPlayPause
    case 32:  // Space (some TV remotes)
      e.preventDefault();
      video.paused ? video.play().catch(()=>{}) : video.pause();
      break;
    case 415: // MediaPlay
      e.preventDefault();
      video.play().catch(() => {});
      break;
    case 19:  // MediaPause
      e.preventDefault();
      video.pause();
      break;
    case 412: // MediaRewind
    case 37:  // Left arrow — rewind 10s
      if (!isLiveStream()) { e.preventDefault(); video.currentTime = Math.max(0, video.currentTime - 10); }
      break;
    case 417: // MediaFastForward
    case 39:  // Right arrow — forward 10s
      if (!isLiveStream()) { e.preventDefault(); video.currentTime = Math.min(video.duration, video.currentTime + 10); }
      break;
    case 173: // MediaMute
    case 77:  // M key
      video.muted = !video.muted;
      muteIcon.innerHTML = video.muted ? MUTED_SVG : UNMUTED_SVG;
      break;
    case 27:  // Escape — handled above globally
      break;
  }
});

/* -- Player state messaging -- */
function setPlayerState(html, show) {
  playerState.innerHTML = html;
  playerState.className = show ? 'show' : '';
}

/* -- Load & play a channel -- */
function playChannel(country, idx, shouldPushState = true) {
  const ch = byCountry[country]?.[idx];
  if (!ch) return;

  if (shouldPushState) navigateTo("player", { country, channelIdx: idx });

  currentCountry   = country;
  currentChannelIdx = idx;

  overlay.classList.add('active');
  pname.textContent    = ch.name;
  pcountry.textContent = country;

  setPlayerState(`
    <div style="width:36px;height:36px;border-radius:50%;border:3px solid #333;border-top-color:#FF5A1F;animation:spin .8s linear infinite;"></div>
    <div style="margin-top:10px;font-weight:600;">Locking Phase Signal…</div>
  `, true);

  showControls();
  cleanupPlayer();

  watchdog = setTimeout(() => {
    setPlayerState(`
      <div style="color:#FB7185;font-weight:bold;font-size:16px;">Signal Timeout</div>
      <div style="font-size:12px;margin-top:4px;">No active carrier wave detected.</div>
      <button id="retryBtn">Retry</button>
    `, true);
    document.getElementById('retryBtn')?.addEventListener('click', () => playChannel(country, idx, false));
  }, 12000);

  video.addEventListener('playing', onPlaying, { once: true });
  video.addEventListener('error',   onVideoError, { once: true });

  if (window.Hls && window.Hls.isSupported()) {
    hls = new Hls({ maxBufferLength: 30, manifestLoadingMaxRetry: 3, levelLoadingMaxRetry: 3 });
    hls.loadSource(ch.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.ERROR, (event, data) => { if (data.fatal) onVideoError(); });
    video.play().catch(() => {});
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = ch.url;
    video.play().catch(() => {});
  } else {
    video.src = ch.url;
    video.play().catch(() => {});
  }
}

function onPlaying() {
  clearTimeout(watchdog);
  setPlayerState('', false);
  updateProgress();
  scheduleHideControls();
}

function onVideoError() {
  clearTimeout(watchdog);
  setPlayerState(`
    <div style="color:#FB7185;font-weight:bold;font-size:16px;">Loss of Carrier</div>
    <div style="font-size:12px;margin-top:4px;">Cannot parse media feed.</div>
    <button id="retryBtn2">Go Back</button>
  `, true);
  document.getElementById('retryBtn2')?.addEventListener('click', closePlayer);
}

function cleanupPlayer() {
  if (hls) { hls.destroy(); hls = null; }
  video.removeAttribute('src');
  video.load();
  clearTimeout(watchdog);
  clearTimeout(hideControlsTimer);
}

function closePlayerOverlayOnly() {
  cleanupPlayer();
  overlay.classList.remove('active');
  setPlayerState('', false);
  showControls(); // reset for next open
}

function closePlayer() {
  closePlayerOverlayOnly();
  window.history.back();
}

document.getElementById('closePlayer').addEventListener('click', (e) => {
  e.stopPropagation();
  closePlayer();
});

/* ---- Search ---- */
searchInput.addEventListener('input', (e) => {
  if (currentView === "countries") renderCountries(e.target.value);
});

/* ---- Boot ---- */
initTheme();
loadPlaylist();

/* ---- PWA ---- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
}

let deferredInstall = null;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstall = e;
  if (installBtn) installBtn.style.display = 'flex';
});

if (installBtn) {
  installBtn.addEventListener('click', async () => {
    if (!deferredInstall) return;
    deferredInstall.prompt();
    await deferredInstall.userChoice;
    deferredInstall = null;
    installBtn.style.display = 'none';
  });
}

window.addEventListener('appinstalled', () => {
  if (installBtn) installBtn.style.display = 'none';
});
</script>
